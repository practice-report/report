<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Report on a practical investigation of consciousness</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: "IBM Plex Mono", "Courier New", monospace;
            font-size: 12pt;
            line-height: 1.6;
            max-width: 650px;
            margin: 0 auto;
            padding: 40px;
            color: #4a4a4a;
            text-align: justify;
            background-color: #edf4fc;
        }
        .report-title {
            font-size: 14pt;
            text-align: center;
            margin-bottom: 5em;
            margin-top: 3em;
        }
        .chapter-title {
            font-size: 13pt;
            margin-top: 5em;

        p {
            margin: 0 0 1em 0;
        }
        .center {
            text-align: center;
        }
        .small-text {
            font-size: 10pt !important;
        }
        
        /* Новые стили для шапки */
        .header {
            margin-top: 3em; /* 3 пробела от верха */

        }
        .header-link {

    <div class="header">
